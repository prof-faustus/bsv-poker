# CI pipeline for the pure-.NET BSV Poker app. A red stage blocks merge.
# Builds the whole solution (secp256k1 crypto, core game/wallet, P2P/chat, WPF app) and runs the
# dependency-free test suite. WPF requires Windows, so the job runs on windows-latest.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore dotnet/BsvPoker.sln

      - name: Build (Release)
        run: dotnet build dotnet/BsvPoker.sln -c Release --no-restore

      - name: Test (dependency-free runner; non-zero exit fails the build)
        run: dotnet run --project dotnet/test/BsvPoker.Tests/BsvPoker.Tests.csproj -c Release --no-build

      - name: Publish single-file poker.exe (release evidence)
        run: dotnet publish dotnet/src/BsvPoker.App/BsvPoker.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o dist

      - name: Upload poker.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: poker-exe
          path: dist/poker.exe
