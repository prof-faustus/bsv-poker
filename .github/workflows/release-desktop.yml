# Build the NATIVE Windows desktop app (Win32 + WebView2; NO Tauri, NO Rust) on a Windows runner and
# attach a portable, double-click-and-play distribution to the GitHub Release for the pushed tag
# (app §A14, REQ-VM-004). Reproducible from CI. Code signing is a later step (currently unsigned).
name: Release desktop app

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-native:
    runs-on: windows-latest   # ships VS 2022 C++ Build Tools (cl.exe) and the WebView2 runtime.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace + build the web client (in-tree, no bundler)
        run: |
          pnpm install --frozen-lockfile
          node apps/client-web/build.ts

      - name: Build the native host + lifecycle test (cl.exe)
        run: pwsh -NoProfile -File apps/client-desktop/native/build-native.ps1

      - name: Run the lifecycle unit tests
        run: apps/client-desktop/build/test-lifecycle.exe

      - name: Prove the native host renders the client (headless WebView2)
        run: node apps/client-desktop/verify-desktop.ts

      - name: Assemble the portable distribution
        shell: pwsh
        run: |
          $dist = "dist-desktop/bsv-poker"
          New-Item -ItemType Directory -Force $dist | Out-Null
          Copy-Item apps/client-desktop/build/bsv-poker.exe $dist/
          New-Item -ItemType Directory -Force "$dist/web" | Out-Null
          Copy-Item -Recurse apps/client-web/dist/esm/* "$dist/web/"
          if (Test-Path apps/relay-go/relay-go.exe)   { Copy-Item apps/relay-go/relay-go.exe $dist/ }
          if (Test-Path apps/indexer-go/indexer-go.exe) { Copy-Item apps/indexer-go/indexer-go.exe $dist/ }
          Compress-Archive -Path "$dist/*" -DestinationPath dist-desktop/bsv-poker-windows-x64.zip -Force

      - name: Attach the portable app to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/bsv-poker-windows-x64.zip

      - name: Upload the portable app as a workflow artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: bsv-poker-windows-x64
          path: dist-desktop/bsv-poker-windows-x64.zip
